<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Romon AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        body { background-color: #131314; color: #e3e3e3; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: #1e1f20; border: 1px solid #333; border-radius: 28px; padding: 40px; width: 95%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); text-align: center; }
        .brand-title { font-size: 2rem; font-weight: bold; color: white; margin-bottom: 5px; }
        .sub-title { color: #9aa0a6; margin-bottom: 30px; font-size: 0.9rem; }
        .btn-google { background: white; color: #3c4043; border: 1px solid #dadce0; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-google:hover { background: #f8f9fa; }
        .btn-google img { width: 18px; margin-right: 10px; }
        #error-msg { color: #f28b82; font-size: 13px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-title">Romon AI</div>
        <div class="sub-title">Secure login with Google</div>

        <button class="btn-google" onclick="signInWithGoogle()">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg">
            Continue with Google
        </button>
        
        <div id="error-msg"></div>
    </div>

    <script>
        // আপনার নতুন API Key এখানে এনকোড করে রাখা হয়েছে (Security)
        const _sec_config = {
            a: "QUl6YVN5QmtYR1hHWS1Gd1lwZ2tmM09rWDVsMTJNV2hfaFA3c2FF", // Encoded API Key
            b: "cm9tb24tYWkuZmlyZWJhc2VhcHAuY29t",
            c: "cm9tb24tYWk=",
            d: "cm9tb24tYWkuZmlyZWJhc3RvcmFnZS5hcHA=",
            e: "ODA2NDg0NDA4MzI=",
            f: "MTo4MDY0ODQ0MDgzMjp3ZWI6NDQxYTA3OWM5OTY5MDM5NjhkMWNlNQ=="
        };

        const firebaseConfig = {
            apiKey: atob(_sec_config.a),
            authDomain: atob(_sec_config.b),
            projectId: atob(_sec_config.c),
            storageBucket: atob(_sec_config.d),
            messagingSenderId: atob(_sec_config.e),
            appId: atob(_sec_config.f)
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider);
        }

        auth.getRedirectResult().then((result) => {
            if (result.user) {
                localStorage.setItem('romon_user', JSON.stringify(result.user));
                window.location.href = 'index.html';
            }
        }).catch((error) => {
            if(error.code !== 'auth/redirect-cancelled-by-user') {
                showError(error.message);
            }
        });

        function showError(text) {
            const msg = document.getElementById('error-msg');
            msg.innerText = text;
            msg.style.display = 'block';
        }
    </script>
</body>
</html>
